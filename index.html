<!DOCTYPE html>
<html lang="de" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="Boldclaim — Bring your own AI. Wir sehen deine Counter nie.">
  <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)">
  <title>Boldclaim</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>•</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; overscroll-behavior: none; }
    body { -webkit-font-smoothing: antialiased; }
    .scroll-area::-webkit-scrollbar { width: 6px; }
    .scroll-area::-webkit-scrollbar-thumb { background: rgba(160,160,160,0.35); border-radius: 3px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    [x-cloak] { display: none !important; }
    .msg-fade { animation: fadeIn .25s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .typing::after {
      content: '▍';
      animation: blink 1s steps(2) infinite;
      opacity: .5;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }
    textarea { field-sizing: content; }
    .topic-pill { transition: background .15s, transform .1s, border-color .15s; }
    .topic-pill:active { transform: scale(0.97); }
    .drag-over { outline: 2px dashed rgba(0,0,0,.25); outline-offset: -8px; border-radius: 18px; }
    .dark .drag-over { outline-color: rgba(255,255,255,.3); }
    .modal-backdrop { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    /* Sexy radial spotlight in welcome */
    .hero-bg {
      background-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(120,113,108,0.08), transparent 60%);
    }
    .dark .hero-bg {
      background-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(244,244,245,0.06), transparent 60%);
    }
    /* Markdown content styling */
    .prose-content { line-height: 1.6; word-wrap: break-word; overflow-wrap: anywhere; }
    .prose-content p { margin: 0 0 0.65em 0; }
    .prose-content p:last-child { margin-bottom: 0; }
    .prose-content strong { font-weight: 600; }
    .prose-content em { font-style: italic; }
    .prose-content ul { list-style: disc; padding-left: 1.4em; margin: 0.5em 0; }
    .prose-content ol { list-style: decimal; padding-left: 1.6em; margin: 0.5em 0; }
    .prose-content li { margin: 0.2em 0; }
    .prose-content h3.section-header {
      font-size: 0.85em;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin: 0.9em 0 0.3em 0;
      padding-top: 0.2em;
      color: inherit;
      scroll-margin-top: 60px;
    }
    .prose-content h3.section-header:first-child { margin-top: 0; padding-top: 0; }
    .prose-content a.link {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
      word-break: break-all;
      overflow-wrap: anywhere;
    }
    .prose-content a.link:hover { text-decoration-thickness: 2px; }
    .prose-content blockquote {
      border-left: 3px solid currentColor;
      opacity: .7;
      padding-left: 0.8em;
      margin: 0.5em 0;
    }
    @keyframes sectionFlash {
      0%, 100% { background-color: transparent; }
      40% { background-color: rgba(250,204,21,0.28); }
    }
    .section-flash { animation: sectionFlash 1.6s ease; border-radius: 6px; }
    .dark .section-flash { animation: sectionFlashDark 1.6s ease; }
    @keyframes sectionFlashDark {
      0%, 100% { background-color: transparent; }
      40% { background-color: rgba(250,204,21,0.18); }
    }
    .section-active {
      background-color: rgba(250,204,21,0.12);
      border-radius: 6px;
      padding-left: 0.6em;
      padding-right: 0.6em;
      transition: background-color 0.2s ease;
    }
    .dark .section-active {
      background-color: rgba(250,204,21,0.08);
    }
    .section-active.section-header {
      padding-top: 0.3em;
      padding-bottom: 0.1em;
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script>
    // Light default. Dark only if user explicitly toggled.
    (function() {
      if (localStorage.getItem('boldclaim_theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body class="h-full bg-stone-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans antialiased">

<div x-data="boldclaimApp()" x-init="init()" x-cloak class="flex h-full">

  <!-- Sidebar (history) -->
  <aside x-show="sidebarOpen"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="-translate-x-full sm:translate-x-0 sm:opacity-0"
         x-transition:enter-end="translate-x-0 opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="translate-x-0 opacity-100"
         x-transition:leave-end="-translate-x-full sm:translate-x-0 sm:opacity-0"
         @click.outside="sidebarOpen = window.innerWidth >= 1024"
         class="fixed sm:static inset-y-0 left-0 z-30 w-72 bg-white dark:bg-zinc-900 border-r border-zinc-200 dark:border-zinc-800 flex flex-col shrink-0">
    <div class="h-12 px-4 flex items-center justify-between border-b border-zinc-200 dark:border-zinc-800">
      <span class="text-sm font-semibold tracking-tight" x-text="t('sidebar.history')"></span>
      <button @click="sidebarOpen=false" class="lg:hidden p-1.5 rounded text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-800">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <button @click="newChat()"
            class="m-3 px-3 py-2 text-sm font-medium rounded-lg bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 hover:bg-zinc-800 dark:hover:bg-white transition flex items-center justify-center gap-2 shrink-0">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      <span x-text="t('sidebar.newChat')"></span>
    </button>
    <div class="flex-1 overflow-y-auto scroll-area px-2 pb-3 space-y-1">
      <template x-for="conv in archive" :key="conv.id">
        <div class="group flex items-center gap-1">
          <button @click="loadConversation(conv.id)"
                  :class="conv.id === activeConvId ? 'bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100' : 'text-zinc-700 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800'"
                  class="flex-1 min-w-0 text-left px-3 py-2 rounded-lg text-sm transition truncate">
            <span x-text="conv.title"></span>
          </button>
          <button @click="deleteConversation(conv.id)"
                  class="opacity-0 group-hover:opacity-100 p-1.5 rounded text-zinc-400 hover:text-red-500 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </template>
      <div x-show="archive.length === 0" class="text-center text-xs text-zinc-400 dark:text-zinc-600 mt-8 px-4" x-text="t('sidebar.empty')"></div>
    </div>
    <div class="p-3 border-t border-zinc-200 dark:border-zinc-800 text-[11px] text-zinc-400 dark:text-zinc-600" x-text="t('sidebar.privacy')"></div>
  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div x-show="sidebarOpen" x-transition.opacity
       @click="sidebarOpen=false"
       class="fixed inset-0 bg-black/30 z-20 lg:hidden"></div>

  <!-- Main column -->
  <div class="flex flex-col flex-1 min-w-0">

    <!-- Header -->
    <header class="flex items-center justify-between px-4 sm:px-6 h-12 border-b border-zinc-200 dark:border-zinc-800 shrink-0 bg-white/70 dark:bg-zinc-950/70 backdrop-blur">
      <div class="flex items-center gap-2">
        <button @click="sidebarOpen=!sidebarOpen"
                title="Verlauf"
                class="p-2 -ml-2 rounded-md text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="text-base font-semibold tracking-tight">Boldclaim</span>
        <span class="text-xs text-zinc-400 dark:text-zinc-600 font-mono hidden sm:inline">v2</span>
      </div>
      <div class="flex items-center gap-1">
        <!-- Language toggle (site-wide) -->
        <div class="flex items-center text-[11px] font-mono mr-1 rounded-md overflow-hidden border border-zinc-200 dark:border-zinc-800">
          <button @click="setLang('de')"
                  :class="settings.lang==='de' ? 'bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900' : 'bg-transparent text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100'"
                  class="px-2 py-1 transition">DE</button>
          <button @click="setLang('en')"
                  :class="settings.lang==='en' ? 'bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900' : 'bg-transparent text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100'"
                  class="px-2 py-1 transition">EN</button>
        </div>
        <button @click="toggleTheme()" :title="dark ? t('theme.light') : t('theme.dark')"
                class="p-2 rounded-md text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition">
          <svg x-show="!dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg x-show="dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button @click="settingsOpen=true" title="Einstellungen"
                class="p-2 rounded-md text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- Onboarding banner (no key) -->
    <div x-show="!hasKey() && !settingsOpen && messages.length === 0"
         class="bg-amber-100 dark:bg-amber-500/10 border-b border-amber-300 dark:border-amber-500/30 text-amber-900 dark:text-amber-200 text-sm px-4 sm:px-6 py-2 flex items-center justify-between">
      <span x-text="t('banner.needKey')"></span>
      <button @click="settingsOpen=true; settingsTab='onboarding'"
              class="font-semibold underline hover:no-underline" x-text="t('banner.setup')"></button>
    </div>

    <!-- Main scroll area -->
    <main class="flex-1 overflow-y-auto scroll-area"
          @drop.prevent="handleDrop($event)"
          @dragover.prevent="dragOver=true"
          @dragleave="dragOver=false"
          :class="dragOver && 'drag-over'">

      <!-- Welcome state -->
      <div x-show="messages.length === 0" class="hero-bg max-w-2xl mx-auto px-6 pt-16 sm:pt-24 pb-8">
        <h1 class="text-3xl sm:text-5xl font-semibold tracking-tight" x-text="t('welcome.title')"></h1>
        <p class="mt-4 text-zinc-600 dark:text-zinc-400 text-lg max-w-xl" x-text="t('welcome.sub')"></p>
        <div class="mt-8 flex flex-wrap gap-2">
          <template x-for="topic in topics" :key="topic.label">
            <button @click="usePill(topic)"
                    class="topic-pill text-sm px-3.5 py-1.5 rounded-full bg-white dark:bg-zinc-800/70 hover:bg-zinc-50 dark:hover:bg-zinc-700 text-zinc-700 dark:text-zinc-200 border border-zinc-200 dark:border-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-600 shadow-sm">
              <span x-text="topic.label"></span>
            </button>
          </template>
        </div>
        <div class="mt-12 flex flex-wrap gap-x-3 gap-y-1 text-xs text-zinc-500 dark:text-zinc-500">
          <button @click="settingsOpen=true; settingsTab='onboarding'" class="underline hover:text-zinc-700 dark:hover:text-zinc-300" x-text="t('welcome.setup')"></button>
          <button @click="settingsOpen=true; settingsTab='privacy'" class="underline hover:text-zinc-700 dark:hover:text-zinc-300" x-text="t('welcome.privacy')"></button>
          <a href="https://github.com/boldclaim/chat" target="_blank" rel="noopener" class="underline hover:text-zinc-700 dark:hover:text-zinc-300" x-text="t('welcome.code')"></a>
        </div>
      </div>

      <!-- Messages -->
      <div x-show="messages.length > 0" class="max-w-2xl mx-auto px-4 sm:px-6 py-6 space-y-5">
        <template x-for="msg in messages" :key="msg.id">
          <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'" class="msg-fade">
            <div :class="msg.role === 'user'
                  ? 'bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-2xl rounded-br-md shadow-sm'
                  : 'bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 rounded-2xl rounded-bl-md border border-zinc-200 dark:border-zinc-800 shadow-sm'"
                 class="max-w-full sm:max-w-[88%] px-4 py-3">

              <!-- Images -->
              <template x-if="msg.images && msg.images.length">
                <div class="flex flex-wrap gap-2 mb-2">
                  <template x-for="(img, i) in msg.images" :key="i">
                    <img :src="img" @click="lightboxImg=img"
                         class="rounded-lg max-h-48 cursor-zoom-in border border-zinc-300/30 dark:border-zinc-700">
                  </template>
                </div>
              </template>

              <!-- Body -->
              <template x-if="msg.role === 'user'">
                <div class="whitespace-pre-wrap leading-relaxed text-[15px]" style="overflow-wrap: anywhere; word-break: break-word;" x-text="msg.content"></div>
              </template>
              <template x-if="msg.role === 'assistant'">
                <div>
                  <!-- Analysis (collapsible, only if present) -->
                  <details x-show="splitContent(msg.content).analysis.length > 0"
                           class="mb-3 rounded-lg border border-amber-200 dark:border-amber-900/40 bg-amber-50 dark:bg-amber-500/5 group">
                    <summary class="px-3 py-2 cursor-pointer text-xs font-semibold text-amber-900 dark:text-amber-200 list-none flex items-center gap-2 select-none">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="transition group-open:rotate-90"><polyline points="9 18 15 12 9 6"/></svg>
                      <span x-text="t('msg.analysisTitle')"></span>
                      <span class="ml-auto text-[10px] font-normal opacity-60" x-text="t('msg.analysisHint')"></span>
                    </summary>
                    <div class="px-3 pb-3 pt-1 prose-content text-[14px] text-amber-950 dark:text-amber-100"
                         x-html="renderMarkdown(splitContent(msg.content).analysis)"></div>
                  </details>
                  <!-- Reply (click sections to see purpose annotation) -->
                  <div class="prose-content text-[15px] cursor-pointer"
                       :class="msg.streaming && 'typing'"
                       :data-msg-id="msg.id"
                       @click="onSectionClick($event)"
                       x-html="renderMarkdown(splitContent(msg.content).reply)"></div>
                </div>
              </template>

              <!-- Footer (assistant only) -->
              <template x-if="msg.role === 'assistant' && !msg.streaming">
                <div class="mt-2.5 pt-2 border-t border-zinc-100 dark:border-zinc-800 flex flex-wrap items-center gap-3 text-xs text-zinc-500">
                  <button @click="copyAs(msg, 'reddit', $event)" class="hover:text-zinc-900 dark:hover:text-zinc-200 flex items-center gap-1">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    <span x-text="msg.copiedAs === 'reddit' ? t('msg.copiedReddit') : t('msg.copyReddit')"></span>
                  </button>
                  <button @click="copyAs(msg, 'plain', $event)" class="hover:text-zinc-900 dark:hover:text-zinc-200 flex items-center gap-1">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <span x-text="msg.copiedAs === 'plain' ? t('msg.copiedPlain') : t('msg.copyPlain')"></span>
                  </button>
                  <template x-if="msg.sources && msg.sources.length">
                    <details class="group">
                      <summary class="cursor-pointer hover:text-zinc-900 dark:hover:text-zinc-200 list-none flex items-center gap-1">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="transition group-open:rotate-90"><polyline points="9 18 15 12 9 6"/></svg>
                        <span x-text="t('msg.sources') + ' (' + msg.sources.length + ')'"></span>
                      </summary>
                      <div class="mt-2 space-y-1.5 text-zinc-600 dark:text-zinc-400">
                        <template x-for="(s, i) in msg.sources" :key="i">
                          <div class="border-l border-zinc-300 dark:border-zinc-700 pl-3">
                            <div class="text-[11px] font-mono text-zinc-500 dark:text-zinc-500" x-text="s.source"></div>
                            <div class="text-[12px]" x-text="s.snippet"></div>
                          </div>
                        </template>
                      </div>
                    </details>
                  </template>
                </div>
              </template>

              <!-- Error -->
              <template x-if="msg.error">
                <div class="mt-2 text-xs text-red-600 dark:text-red-400 border-l-2 border-red-500/50 pl-2">
                  <span x-text="msg.error"></span>
                  <button @click="settingsOpen=true" class="underline ml-1">Settings</button>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </main>

    <!-- Composer -->
    <footer class="border-t border-zinc-200 dark:border-zinc-800 px-3 sm:px-4 pt-3 pb-4 shrink-0 bg-stone-50 dark:bg-zinc-950">
      <div class="max-w-2xl mx-auto">

        <!-- Quick platform/tone selectors -->
        <div class="flex flex-wrap items-center gap-1.5 mb-2 px-1 text-xs">
          <span class="text-zinc-400 dark:text-zinc-600" x-text="t('comp.for')"></span>
          <select x-model="settings.platform" @change="saveSettings()"
                  class="bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-md px-2 py-1 font-medium text-zinc-700 dark:text-zinc-300 focus:outline-none focus:border-zinc-400 dark:focus:border-zinc-600 cursor-pointer">
            <option value="Reddit" x-text="t('platform.reddit')"></option>
            <option value="X/Twitter" x-text="t('platform.twitter')"></option>
            <option value="Mündlich" x-text="t('platform.spoken')"></option>
            <option value="WhatsApp" x-text="t('platform.whatsapp')"></option>
          </select>
          <span class="text-zinc-400 dark:text-zinc-600" x-text="t('comp.tone')"></span>
          <select x-model="settings.tone" @change="saveSettings()"
                  class="bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-md px-2 py-1 font-medium text-zinc-700 dark:text-zinc-300 focus:outline-none focus:border-zinc-400 dark:focus:border-zinc-600 cursor-pointer">
            <option value="Sachlich" x-text="t('tone.factual')"></option>
            <option value="Hämisch" x-text="t('tone.snarky')"></option>
            <option value="Gungho" x-text="t('tone.gungho')"></option>

  function boldclaimApp() {
    return {
      // State
      messages: [],
      input: '',
      pendingImages: [],
      busy: false,
      currentAbort: null,
      dragOver: false,
      lightboxImg: null,
      settingsOpen: false,
      settingsTab: 'general',
      sidebarOpen: window.innerWidth >= 1024,
      showKey: false,
      testing: false,
      testStatus: '',
      testStatusOk: null,
      archive: [],
      activeConvId: null,
      dark: document.documentElement.classList.contains('dark'),
      customMode: false,
      activeSection: null,

      settings: {
        provider: 'anthropic',
        model: '',
        apiKey: '',
        platform: 'Reddit',
        tone: 'Sachlich',
        lang: 'de',
        voiceSample: ''
      },

      // Init
      init() {
        const saved = localStorage.getItem('boldclaim_settings_v2');
        if (saved) {
          try { Object.assign(this.settings, JSON.parse(saved)); } catch (e) {}
        }
        if (!this.settings.model) this.settings.model = this.defaultModel(this.settings.provider);
        this.customMode = !this.modelsForProvider().some(m => m.id === this.settings.model);
        this.loadArchive();
        const session = localStorage.getItem('boldclaim_session_v2');
        if (session) {
          try {
            const s = JSON.parse(session);
            if (s.messages && Date.now() - s.ts < 24 * 3600 * 1000) {
              this.messages = s.messages;
              this.activeConvId = s.id || null;
            }
          } catch (e) {}
        }
        window.addEventListener('resize', () => {
          if (window.innerWidth < 1024 && this.sidebarOpen) this.sidebarOpen = false;
        });
      },

      loadArchive() {
        try {
          this.archive = JSON.parse(localStorage.getItem('boldclaim_archive_v2') || '[]');
        } catch (e) { this.archive = []; }
      },

      // Computed
      hasKey() { return this.settings.apiKey && this.settings.apiKey.length > 8; },
      canSend() {
        if (!(this.input.trim() || this.pendingImages.length)) return false;
        if (this.busy) return false;
        return this.hasKey();
      },
      countUserMsgs() { return this.messages.filter(m => m.role === 'user').length; },
      modelLabel() {
        if (this.hasKey()) return `${this.settings.provider} · ${this.settings.model || this.defaultModel(this.settings.provider)}`;
        return this.t('comp.noKey');
      },
      defaultModel(p) { return PROVIDERS[p]?.defaultModel || ''; },
      keyPlaceholder(p) { return PROVIDERS[p]?.keyPlaceholder || ''; },
      modelsForProvider() { return PROVIDERS[this.settings.provider]?.models || []; },
      onModelSelect(value) {
        if (value === '__custom__') {
          this.customMode = true;
          this.settings.model = '';
        } else {
          this.customMode = false;
          this.settings.model = value;
        }
      },
      testStatusColor() {
        if (this.testStatusOk === true) return 'text-emerald-600 dark:text-emerald-400';
        if (this.testStatusOk === false) return 'text-red-600 dark:text-red-400';
        return 'text-zinc-500';
      },

      // i18n + topics
      get topics() { return TOPICS[this.settings.lang] || TOPICS.de; },
      t(key) {
        const dict = I18N[this.settings.lang] || I18N.de;
        return dict[key] || I18N.de[key] || key;
      },
      setLang(lang) {
        this.settings.lang = lang;
        this.saveSettings();
        document.documentElement.lang = lang;
      },

      // Theme
      toggleTheme() {
        this.dark = !this.dark;
        document.documentElement.classList.toggle('dark', this.dark);
        localStorage.setItem('boldclaim_theme', this.dark ? 'dark' : 'light');
      },

      // Settings
      onProviderChange() {
        this.settings.model = this.defaultModel(this.settings.provider);
        this.customMode = false;
        this.testStatus = '';
        this.testStatusOk = null;
      },
      saveSettings() {
        localStorage.setItem('boldclaim_settings_v2', JSON.stringify(this.settings));
      },
      async testKey() {
        this.testing = true;
        this.testStatus = '';
        this.testStatusOk = null;
        try {
          const reply = await this.callProvider({
            systemPrompt: 'Antworte nur mit dem Wort: ok',
            messages: [{ role: 'user', content: 'test' }],
            stream: false
          });
          if (reply && reply.toLowerCase().includes('ok')) {
            this.testStatus = this.t('set.testOk');
            this.testStatusOk = true;
          } else {
            this.testStatus = this.t('set.testReceived');
            this.testStatusOk = true;
          }
        } catch (e) {
          this.testStatus = e.message.slice(0, 80);
          this.testStatusOk = false;
        } finally {
          this.testing = false;
        }
      },

      // Compose
      usePill(t) {
        this.input = t.sample;
        this.$nextTick(() => {
          const ta = document.querySelector('textarea');
          if (ta) ta.focus();
        });
      },
      handlePaste(e) {
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.type?.startsWith('image/')) {
            e.preventDefault();
            const file = item.getAsFile();
            if (file) this.addImage(file);
          }
        }
      },
      handleDrop(e) {
        this.dragOver = false;
        const files = e.dataTransfer?.files;
        if (!files) return;
        for (const f of files) {
          if (f.type.startsWith('image/')) this.addImage(f);
        }
      },
      handleFiles(e) {
        for (const f of e.target.files || []) {
          if (f.type.startsWith('image/')) this.addImage(f);
        }
        e.target.value = '';
      },
      loadVoiceSample(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        if (file.size > 200 * 1024) {
          alert('Voice-Sample > 200KB, ist zu groß. Kürze auf prägnante Beispiele.');
          e.target.value = '';
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          this.settings.voiceSample = reader.result;
          this.saveSettings();
        };
        reader.readAsText(file);
        e.target.value = '';
      },
      addImage(file) {
        if (this.pendingImages.length >= 5) return;
        if (file.size > 5 * 1024 * 1024) {
          alert(this.t('comp.imgTooLarge'));
          return;
        }
        const reader = new FileReader();
        reader.onload = () => this.pendingImages.push(reader.result);
        reader.readAsDataURL(file);
      },

      // Send
      async send() {
        if (!this.canSend()) return;

        const userMsg = {
          id: crypto.randomUUID(),
          role: 'user',
          content: this.input.trim(),
          images: [...this.pendingImages],
          ts: Date.now()
        };
        if (this.messages.length === 0) this.activeConvId = crypto.randomUUID();
        this.messages.push(userMsg);
        this.input = '';
        this.pendingImages = [];
        this.persistSession();
        this.scrollDown();

        // Pinecone-Context (only if WORKER_URL set)
        let context = { docs: [], systemPrompt: this.fallbackSystemPrompt() };
        if (WORKER_URL) {
          try {
            const ctxRes = await fetch(WORKER_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                query: this.queryFromHistory(),
                topK: 5,
                platform: this.settings.platform,
                tone: this.settings.tone,
                lang: this.settings.lang
              })
            });
            if (ctxRes.ok) context = await ctxRes.json();
          } catch (e) { /* fallback */ }
        }

        const providerMessages = this.buildProviderMessages();
        this.activeSection = null;
        const assistantMsg = {
          id: crypto.randomUUID(),
          role: 'assistant',
          content: '',
          streaming: true,
          sources: context.docs || [],
          ts: Date.now()
        };
        this.messages.push(assistantMsg);
        // Reactive proxy reference (Alpine wraps array elements lazily; mutating the local
        // pre-push object does NOT trigger reactivity, so we re-fetch via index)
        const idx = this.messages.length - 1;
        this.busy = true;
        this.scrollDown();

        try {
          await this.callProvider({
            systemPrompt: context.systemPrompt,
            messages: providerMessages,
            stream: true,
            onDelta: (text) => {
              this.messages[idx].content += text;
              this.scrollDown();
            }
          });
        } catch (e) {
          this.messages[idx].error = e.message;
        } finally {
          this.messages[idx].streaming = false;
          this.busy = false;
          this.currentAbort = null;
          this.persistSession();
        }
      },

      cancel() {
        if (this.currentAbort) this.currentAbort.abort();
      },

      queryFromHistory() {
        const recentUser = this.messages
          .filter(m => m.role === 'user')
          .slice(-2)
          .map(m => m.content)
          .join(' ');
        return recentUser.slice(0, 1000);
      },

      buildProviderMessages() {
        const out = [];
        const visionProvider = PROVIDERS[this.settings.provider]?.vision || false;
        for (const m of this.messages) {
          if (m.role === 'user') {
            if (m.images?.length && visionProvider) {
              if (this.settings.provider === 'anthropic') {
                const content = [];
                for (const img of m.images) {
                  const [meta, data] = img.split(',');
                  const mime = meta.match(/data:([^;]+)/)?.[1] || 'image/png';
                  content.push({ type: 'image', source: { type: 'base64', media_type: mime, data } });
                }
                content.push({ type: 'text', text: m.content || '(siehe Bild)' });
                out.push({ role: 'user', content });
              } else if (this.settings.provider === 'openai' || this.settings.provider === 'openrouter') {
                const content = [{ type: 'text', text: m.content || '(siehe Bild)' }];
                for (const img of m.images) content.push({ type: 'image_url', image_url: { url: img } });
                out.push({ role: 'user', content });
              } else {
                out.push({ role: 'user', content: m.content + '\n\n[Bild im Anhang, Provider unterstützt keine Vision]' });
              }
            } else {
              out.push({ role: 'user', content: m.content });
            }
          } else if (m.role === 'assistant' && m.content && !m.error) {
            out.push({ role: 'assistant', content: m.content });
          }
        }
        return out;
      },

      fallbackSystemPrompt() {
        const tone = this.settings.tone;
        const lang = this.settings.lang;
        const isDE = lang === 'de';

        // Hard language directive — first AND last line of system prompt for emphasis
        const langTop = isDE
          ? 'KRITISCH: Antworte AUSSCHLIESSLICH auf Deutsch. Auch Tactic-Namen, Section-Header und Quellen-Hinweise auf Deutsch (Quote-Mining bleibt Quote-Mining, aber kein Mix mit englischen Erklärsätzen).'
          : 'CRITICAL: Respond ENTIRELY in English. Section headers, tactic names, and all prose must be English. Do not mix in German sentences. Tactic-names: Quote-Mining, Strawman, Whataboutism, Goalpost-shifting, "Bullshit"-stamping, Self-contradiction, Side-step, Cherry-picking, Discipline-wash, Peer-review-trump, Selective memory.';

        let toneInstruction = '';
        if (tone === 'Sachlich' || tone === 'Hämisch') {
          toneInstruction = isDE
            ? `Schreib wie ein Reddit-Kommentar, kein akademisches Paper. Keine generischen Section-Header wie "Faktenkorrektur" oder "Quellen". Wenn Sections sinnvoll sind, dann mit '## kurze Aussage als Header' (max 4 Wörter, klingt wie eine Reddit-Zeile, nicht wie ein Lehrbuch). Maximum 220 Wörter.${tone === 'Hämisch' ? ' Häme an 1-2 Stellen, nie billig.' : ''}`
            : `Write like a Reddit comment, not an academic paper. No generic section headers like "Fact correction" or "Sources". If sections make sense, use '## short Reddit-line as header' (max 4 words, sounds like a comment, not a textbook). Max 220 words.${tone === 'Snarky' || tone === 'Hämisch' ? ' Sharp jab in 1-2 places, never cheap.' : ''}`;
        } else if (tone === 'Gungho') {
          toneInstruction = isDE
            ? `Vernichtend, keine Konzessionen. Nur Aktenlage gegen Behauptung. Schwache eigene Punkte weglassen.

PFLICHT-STRUKTUR: Numerierte Tactic-Liste. Jede Section ist EIN Tactic-Name (kein Floskel). Format: '## 1. Selbstwiderspruch', '## 2. Quote-Mining', '## 3. Drei-Ebenen-Verklebung' usw. Inhalt jedes Punkts: 1-3 Sätze, direkt am Punkt. Max 7 Punkte. Letzter Absatz (ohne Header) ist scharfer Schluss-Satz.`

            if (sibling.tagName === 'H3' && sibling.classList?.contains('section-header')) {
              this.selectSection(sibling.dataset.sectionId);
              return;
            }
            sibling = sibling.previousElementSibling;
          }
          el = el.parentElement;
        }
      },

      // Copy
      copyAs(msg, mode, ev) {
        let text = this.splitContent(msg.content || '').reply || msg.content || '';
        if (mode === 'plain') text = this.toPlain(text);
        navigator.clipboard.writeText(text);
        msg.copiedAs = mode;
        setTimeout(() => { msg.copiedAs = null; }, 1500);
      },
      toPlain(text) {
        return text
          .replace(/`([^`]+)`/g, '$1')
          .replace(/\*\*([^*]+)\*\*/g, '$1')
          .replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '$1')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1 ($2)')
          .replace(/^#{1,6}\s+/gm, '')
          .replace(/^>\s?/gm, '')
          .replace(/^- /gm, '• ')
          .trim();
      },

      scrollDown() {
        this.$nextTick(() => {
          const main = document.querySelector('main');
          if (main) main.scrollTop = main.scrollHeight;
        });
      }
    };
  }
</script>
